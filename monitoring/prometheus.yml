# Prometheus scrape configuration for TaskForge
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI service metrics (exposed via prometheus-fastapi-instrumentator)
  - job_name: "taskforge-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["taskforge-api:8000"]
        labels:
          service: "taskforge-api"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
